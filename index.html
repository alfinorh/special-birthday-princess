<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbelina & Love Celebration - Princess Birthdayy!!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff5f8; font-family: 'Poppins', sans-serif; }
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        
        /* Tambahan Visualizer Musik - Sembunyi di awal */
        .music-visualizer { display: none; align-items: flex-end; gap: 4px; height: 20px; margin-bottom: 10px; }
        .bar { width: 5px; background: #ff8fa3; animation: sound 1s infinite ease-in-out; }
        .bar:nth-child(1) { animation-delay: 0.1s; }
        .bar:nth-child(2) { animation-delay: 0.3s; }
        .bar:nth-child(3) { animation-delay: 0.5s; }
        .bar:nth-child(4) { animation-delay: 0.7s; }
        @keyframes sound { 0%, 100% { height: 5px; } 50% { height: 20px; } }

        .card { background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 30px; text-align: center; width: 290px; border: 2px solid #ffcad4; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3); position: relative; }
        .photo-container { width: 120px; height: 120px; margin: 0 auto 15px auto; border-radius: 50%; border: 4px solid #ff9a9e; overflow: hidden; display: none; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-family: 'Dancing Script', cursive; color: #ff4d6d; margin-bottom: 10px; }
        #greeting { color: #ff8fa3; font-weight: 600; font-size: 18px; margin-bottom: 20px; }
        #typewriter { color: #555; margin: 20px 0; min-height: 60px; line-height: 1.6; }
        .btn-action { background: linear-gradient(45deg, #ff4d6d, #ff8fa3); color: white; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-weight: 700; font-size: 16px; transition: transform 0.1s; }
        .btn-action:active { transform: scale(0.95); }
        
        /* KUPU-KUPU DENGAN ANIMASI */
        .butterfly { position: absolute; width: 60px; z-index: 99; display: none; pointer-events: none; animation: floatButterfly 3s ease-in-out infinite; }
        .bf-tl { top: -20px; left: -20px; transform: rotate(-20deg); }
        .bf-br { bottom: -20px; right: -20px; transform: rotate(160deg); }
        
        @keyframes floatButterfly {
            0% { transform: translateY(0px) rotate(-20deg); }
            50% { transform: translateY(-15px) rotate(-10deg); }
            100% { transform: translateY(0px) rotate(-20deg); }
        }

        /* KERETA FOTO (POLAROID TRAIN) */
        .gallery-train { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: none; overflow: hidden; }
        .polaroid { 
            position: absolute; width: 100px; height: 120px; background: white; 
            padding: 10px 10px 20px 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: moveTrain 15s linear infinite;
        }
        .polaroid img { width: 100%; height: 85px; object-fit: cover; }
        @keyframes moveTrain { from { transform: translateX(110vw) translateY(-50px); } to { transform: translateX(-150px) translateY(100px); } }
    </style>
</head>
<body>

    <audio id="myAudio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <canvas id="canvas"></canvas>

    <div class="gallery-train" id="train">
        <div class="polaroid" style="top: 10%; animation-delay: 0s;"><img src="images/princess 1.jpeg"></div>
        <div class="polaroid" style="top: 40%; animation-delay: 3s;"><img src="images/princess 2.jpeg"></div>
        <div class="polaroid" style="top: 70%; animation-delay: 6s;"><img src="images/princess 3.jpeg"></div>
        <div class="polaroid" style="top: 20%; animation-delay: 9s;"><img src="images/princess 4.jpeg"></div>
        <div class="polaroid" style="top: 60%; animation-delay: 12s;"><img src="images/princess 5.jpeg"></div>
    </div>

    <div class="container">
        <div class="music-visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="card">
            <img src="images/butterflyy.png" class="butterfly bf-tl" id="bfTL" alt="butterfly">
            <img src="images/butterflyy.png" class="butterfly bf-br" id="bfBR" alt="butterfly">

            <h1 id="mainTitle" style="display:none; font-size: 30px;">Special for Princess 💞</h1>
            
            <div id="greetingContainer">
                <h1>Haiii cantikk 💞</h1>
                <p id="greeting">a little something, just for you..</p>
            </div>

            <div class="photo-container" id="photoBox">
                <img src="images/image.jpeg" id="fotoUtama" alt="Foto Kejutan">
            </div>
            
            <div id="typewriter">pencet tombol di bawah buat ngelihat sesuatu...</div>
            
            <button id="nextBtn" class="btn-action">mulai ✨</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const nextBtn = document.getElementById('nextBtn');
        const audio = document.getElementById('myAudio');
        const textElement = document.getElementById('typewriter');
        const photoBox = document.getElementById('photoBox');
        const mainTitle = document.getElementById('mainTitle');
        const greetingContainer = document.getElementById('greetingContainer');
        const bfTL = document.getElementById('bfTL');
        const bfBR = document.getElementById('bfBR');
        const train = document.getElementById('train');
        
        let particles = [];
        let step = 0;
        const story = [
            "haii... ada sesuatu yang mau akuu kasih tau ke kamuu..",
            "sebenernya, setiap hari yang aku lewati bareng kamuu itu berharga banget..",
            "makasihh yaa udah selalu support akuu lewat respon-respon baik kamuu yang bikin hidup aku jadi makin bermakna",
            "akuu harap kamuu diluar sana selalu dikelilingi oleh hal-hal baik, merasa cukup dengan dirimu sendiri, dan tidak pernah lupa bahwa kamu sudah melakukan yang terbaik sejauh ini.",
            "maaf yaa kalau belakangan ini perlakuan aku ke kamu kesannya lebih dari sekadar teman, akuu nggak punya niat untuk jatuh cinta, tapi rasa nyaman itu berubah jadi perasaan lebih",
            "sekali lagii happy birthdayy yaa princess!! semoga kejutan kecil dari akuu bisa bikin kamuu senyum seharian..🤍🤍"
        ];

        function typeWriter(text, i, fnCallback) {
            if (i < text.length) {
                textElement.innerHTML = text.substring(0, i + 1);
                setTimeout(() => typeWriter(text, i + 1, fnCallback), 90);
            } else if (fnCallback) setTimeout(fnCallback, 600);
        }

        function nextStep() {
            if (step === 0) {
                audio.play().catch(e => console.log("Audio menunggu interaksi"));
                greetingContainer.style.display = 'none';
                // Munculin visualizer pas tombol mulai ditekan
                document.querySelector('.music-visualizer').style.display = 'flex';
            }

            if (step < story.length) {
                nextBtn.style.display = "none";
                textElement.innerHTML = "";
                typeWriter(story[step], 0, () => { 
                    nextBtn.style.display = "inline-block";
                    nextBtn.innerHTML = "lanjut ✨"; 
                });
                step++;
            } else {
                photoBox.style.display = "block";
                mainTitle.style.display = "block";
                train.style.display = "block";
                bfTL.style.display = "block";
                bfBR.style.display = "block";

                textElement.innerHTML = "makasihh yaa buat semuanyaa! kamu berharga banget! ❤️";
                nextBtn.innerHTML = "YEAYYYYY!! 🎆";
                createExplosion(window.innerWidth / 2, window.innerHeight / 2);
                nextBtn.onclick = triggerYayFirework;
            }
        }

        function triggerYayFirework(e) {
            const x = window.innerWidth / 2;
            const y = 100;
            createExplosion(x, y);
            setTimeout(() => createExplosion(x - 100, y - 50), 100);
            setTimeout(() => createExplosion(x + 100, y - 50), 100);
            setTimeout(() => createExplosion(x, y - 100), 200);
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor(x, y, isTrail = false, type = 'flower') {
                this.x = x; this.y = y; this.isTrail = isTrail; this.type = type;
                if (isTrail) {
                    this.vx = (Math.random()-0.5)*2; this.vy = (Math.random()-0.5)*2;
                    this.life = 0.5; this.decay = 0.02; this.size = 30; this.emoji = '🦋';
                } else {
                    const angle = Math.random()*Math.PI*2;
                    const force = Math.random()*8+4;
                    this.vx = Math.cos(angle)*force;
                    this.vy = Math.sin(angle)*force - 3;
                    this.life = 1; this.decay = Math.random()*0.01 + 0.005;
                    this.size = Math.random()*20+15;
                    this.emoji = type === 'lily' ? '🌸' : ['🌸', '💞', '🌸', '🌸', '🌸'][Math.floor(Math.random()*5)];
                }
                this.friction = 0.96;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.life;
                ctx.font = `${this.size}px serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, this.x, this.y); ctx.restore();
            }
            update() {
                this.vx *= this.friction; this.vy *= this.friction;
                this.vy += 0.12; this.x += this.vx; this.y += this.vy;
                this.life -= this.decay;
            }
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 20; i++) particles.push(new Particle(x, y, false));
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(loop);
        }

        window.addEventListener('mousemove', (e) => particles.push(new Particle(e.clientX, e.clientY, true)));
        window.addEventListener('touchmove', (e) => particles.push(new Particle(e.touches[0].clientX, e.touches[0].clientY, true)));

        nextBtn.onclick = nextStep;
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        loop();

        setInterval(() => {
            if (particles.filter(p => !p.isTrail && p.type === 'lily').length < 10) {
                particles.push(new Particle(Math.random()*canvas.width, -30, false, 'lily'));
            }
        }, 1000);
    </script>
</body>
</html>
